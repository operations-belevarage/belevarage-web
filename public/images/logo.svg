<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Background with Indian pattern -->
  <rect width="200" height="60" fill="#811E18" rx="4"/>
  
  <!-- Decorative border -->
  <rect x="2" y="2" width="196" height="56" fill="none" stroke="#C8862A" stroke-width="1" rx="3"/>
  
  <!-- Lotus-inspired mandala center -->
  <g transform="translate(30, 30)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#C8862A" stroke-width="1.5"/>
    
    <!-- Inner decorative circles -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#D4AF37" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FAF6F0" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Lotus petals -->
    <ellipse cx="0" cy="-14" rx="3" ry="6" fill="#D4AF37"/>
    <ellipse cx="12" cy="-7" rx="3" ry="6" fill="#D4AF37" transform="rotate(60)"/>
    <ellipse cx="12" cy="7" rx="3" ry="6" fill="#D4AF37" transform="rotate(120)"/>
    <ellipse cx="0" cy="14" rx="3" ry="6" fill="#D4AF37" transform="rotate(180)"/>
    <ellipse cx="-12" cy="7" rx="3" ry="6" fill="#D4AF37" transform="rotate(240)"/>
    <ellipse cx="-12" cy="-7" rx="3" ry="6" fill="#D4AF37" transform="rotate(300)"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#C8862A"/>
    <circle cx="0" cy="0" r="3" fill="#FAF6F0"/>
  </g>
  
  <!-- BELEVARAGE text -->
  <text x="65" y="38" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#FAF6F0" letter-spacing="2">BELEVARAGE</text>
  
  <!-- Decorative underline -->
  <line x1="65" y1="44" x2="185" y2="44" stroke="#C8862A" stroke-width="1"/>
  
  <!-- Small decorative dots -->
  <circle cx="70" cy="50" r="2" fill="#C8862A"/>
  <circle cx="125" cy="50" r="2" fill="#C8862A"/>
  <circle cx="180" cy="50" r="2" fill="#C8862A"/>
</svg>